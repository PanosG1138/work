name: Feed Change Notifications

on:
  schedule:
    - cron: '30 7 * * *'   # summer EEST (UTC+3)
    - cron: '30 8 * * *'   # winter EET  (UTC+2)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check feed changes and send email
        env:
          SB_URL:         ${{ secrets.FEED_SB_URL }}
          SB_KEY:         ${{ secrets.FEED_SB_KEY }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, json, smtplib, urllib.request
          from datetime import date, timedelta
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          SB_URL         = os.environ['SB_URL']
          SB_KEY         = os.environ['SB_KEY']
          GMAIL_USER     = os.environ['GMAIL_USER']
          GMAIL_APP_PASS = os.environ['GMAIL_APP_PASS']
          NOTIFY_EMAIL   = os.environ['NOTIFY_EMAIL']

          # ── Feed schedules — must match feed_tracker.html exactly ──
          SCHEDULES = {
              'NOVOGEN':      {'phases': ['0-5 Wks','6-10 Wks','11-15 Wks','16-2%'],             'days': [0,35,70,105]},
              'HY-LINE':      {'phases': ['0-3 Wks','4-6 Wks','7-12 Wks','13-15 Wks','16 -2%'], 'days': [0,22,42,84,105]},
              'ISA':          {'phases': ['0-5 Wks','6-10 Wks','11-16 Wks','17-2%'],             'days': [0,35,70,119]},
              'HN_WHITE':     {'phases': ['0-5 Wks','6-10 Wks','11-17 Wks','Prelay'],            'days': [0,36,71,120]},
              'LOHMAN_BROWN': {'phases': ['1-3 Wks','4-8 Wks','9-17 Wks','18-5%'],               'days': [0,22,57,120]},
          }

          # Dropdown breed name → schedule key above. None = no schedule yet (skip).
          BREED_SCHEDULE = {
              'Hy-Line Brown':  'HY-LINE',
              'Novogen Brown':  'NOVOGEN',
              'Novogen White':  'NOVOGEN',
              'Novogen Tinted': 'NOVOGEN',
              'ISA Brown':      'ISA',
              'Dekalb White':   None,
              'H&N Brown':      None,
              'H&N White':      'HN_WHITE',
              'H&N Coral':      None,
              'Lohman Brown':   'LOHMAN_BROWN',
          }

          REMINDER_DAYS = [7, 3]   # send a reminder this many days before the feed change

          def get_athens_today():
              import subprocess
              try:
                  result = subprocess.run(
                      ['python3', '-c',
                       'import datetime,zoneinfo; print(datetime.datetime.now(zoneinfo.ZoneInfo("Europe/Athens")).date())'],
                      capture_output=True, text=True
                  )
                  return date.fromisoformat(result.stdout.strip())
              except Exception:
                  return date.today()

          def adjust_for_weekend(d):
              """If feed change falls on weekend, move notification to Friday."""
              dow = d.weekday()
              if dow == 5:   # Saturday → notify Friday (2 days earlier, so alert is 3 days before Friday)
                  return d - timedelta(days=1), d.strftime('%d/%m/%Y') + ' (Saturday)'
              if dow == 6:   # Sunday → notify Monday (move feed change to Monday)
                  return d + timedelta(days=1), d.strftime('%d/%m/%Y') + ' (Sunday)'
              return d, None

          def supabase_get(path):
              req = urllib.request.Request(
                  f"{SB_URL}/rest/v1/{path}",
                  headers={
                      'apikey':        SB_KEY,
                      'Authorization': f'Bearer {SB_KEY}',
                      'Content-Type':  'application/json',
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def send_email(subject, html_body, text_body):
              msg = MIMEMultipart('alternative')
              msg['Subject'] = subject
              msg['From']    = GMAIL_USER
              msg['To']      = NOTIFY_EMAIL
              msg.attach(MIMEText(text_body, 'plain'))
              msg.attach(MIMEText(html_body, 'html'))
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
                  server.login(GMAIL_USER, GMAIL_APP_PASS)
                  server.sendmail(GMAIL_USER, NOTIFY_EMAIL, msg.as_string())

          # ── Main logic ──
          today    = get_athens_today()
          targets  = {n: today + timedelta(days=n) for n in REMINDER_DAYS}
          print(f"Athens date: {today}  |  Checking for feed changes on: {targets}")

          records = supabase_get('feed_hatches?select=*&order=row_index.asc')
          print(f"Found {len(records)} records")

          due = []

          for rec in records:
              house     = rec.get('house') or '—'
              breed     = rec.get('breed')
              hatch_str = rec.get('hatch')
              if not breed or not hatch_str:
                  continue
              schedule_key = BREED_SCHEDULE.get(breed)
              if not schedule_key:
                  continue

              hatch    = date.fromisoformat(hatch_str)
              schedule = SCHEDULES[schedule_key]

              for phase_label, offset_days in zip(schedule['phases'], schedule['days']):
                  raw_date              = hatch + timedelta(days=offset_days)
                  change_date, orig_day = adjust_for_weekend(raw_date)

                  for days_ahead, target in targets.items():
                      if change_date == target:
                          due.append({
                              'house':       house,
                              'breed':       breed,
                              'phase':       phase_label,
                              'change_date': change_date.strftime('%d/%m/%Y'),
                              'orig_day':    orig_day,
                              'hatch_date':  hatch.strftime('%d/%m/%Y'),
                              'days_ahead':  days_ahead,
                          })
                          note = f" (originally {orig_day})" if orig_day else ""
                          print(f"DUE in {days_ahead}d: {house} / {breed} → {phase_label} on {change_date}{note}")

          if not due:
              print(f"No feed changes due in {REMINDER_DAYS} days.")
          else:
              count   = len(due)
              subject = f"🐔 Feed Change Reminder — {count} change{'s' if count > 1 else ''}"

              # ── Plain text body ──
              text_lines = [
                  f"Feed Change Reminder",
                  f"{'='*40}",
                  f"The following feed change{'s are' if count > 1 else ' is'} coming up:",
                  "",
              ]
              for item in due:
                  text_lines.append(f"  House {item['house']} ({item['breed']})")
                  text_lines.append(f"  Switch to: {item['phase']}")
                  text_lines.append(f"  Change date: {item['change_date']} (in {item['days_ahead']} days)")
                  if item['orig_day']:
                      text_lines.append(f"  Note: Feed date was {item['orig_day']} — moved to avoid weekend")
                  text_lines.append("")
              text_body = "\n".join(text_lines)

              # ── HTML body ──
              rows_html = ""
              for item in due:
                  weekend_note = ""
                  if item['orig_day']:
                      weekend_note = f'<tr><td colspan="2" style="padding:2px 12px 8px;font-size:12px;color:#9a6700;">⚠ Feed date was {item["orig_day"]} — moved to avoid weekend</td></tr>'
                  rows_html += f"""
                  <tr style="border-bottom:1px solid #e0e0e0;">
                    <td style="padding:10px 12px;font-weight:600;color:#1f2328;">{item['house']}</td>
                    <td style="padding:10px 12px;color:#636c76;">{item['breed']}</td>
                    <td style="padding:10px 12px;">
                      <span style="background:#dbeafe;color:#1d4ed8;padding:2px 10px;border-radius:12px;font-size:13px;font-weight:500;">{item['phase']}</span>
                    </td>
                    <td style="padding:10px 12px;font-variant-numeric:tabular-nums;color:#1f2328;">{item['change_date']}</td>
                    <td style="padding:10px 12px;color:#636c76;">{item['days_ahead']} days</td>
                  </tr>
                  {weekend_note}
                  """

              html_body = f"""
              <!DOCTYPE html>
              <html>
              <body style="font-family:'Inter',Arial,sans-serif;background:#f6f8fa;margin:0;padding:24px;">
                <div style="max-width:560px;margin:0 auto;background:#ffffff;border:1px solid #d0d7de;border-radius:8px;overflow:hidden;">
                  <div style="background:#0d1117;padding:16px 20px;display:flex;align-items:center;gap:10px;">
                    <span style="font-size:20px;">🐔</span>
                    <div>
                      <div style="color:#e6edf3;font-size:15px;font-weight:600;">Feed Program</div>
                      <div style="color:#8b949e;font-size:12px;">Poultry Nutrition Tracker</div>
                    </div>
                  </div>
                  <div style="padding:20px;">
                    <p style="margin:0 0 6px;font-size:15px;font-weight:600;color:#1f2328;">
                      Feed Change Reminder
                    </p>
                    <p style="margin:0 0 16px;font-size:13px;color:#636c76;">
                      The following feed change{'s are' if count > 1 else ' is'} coming up.
                    </p>
                    <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #d0d7de;border-radius:6px;border-collapse:collapse;overflow:hidden;">
                      <thead>
                        <tr style="background:#f6f8fa;">
                          <th style="padding:8px 12px;text-align:left;font-size:11px;color:#636c76;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #d0d7de;">House</th>
                          <th style="padding:8px 12px;text-align:left;font-size:11px;color:#636c76;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #d0d7de;">Breed</th>
                          <th style="padding:8px 12px;text-align:left;font-size:11px;color:#636c76;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #d0d7de;">Switch To</th>
                          <th style="padding:8px 12px;text-align:left;font-size:11px;color:#636c76;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #d0d7de;">Change Date</th>
                          <th style="padding:8px 12px;text-align:left;font-size:11px;color:#636c76;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #d0d7de;">Due In</th>
                        </tr>
                      </thead>
                      <tbody>
                        {rows_html}
                      </tbody>
                    </table>
                  </div>
                  <div style="padding:12px 20px;background:#f6f8fa;border-top:1px solid #d0d7de;font-size:11px;color:#8b949e;">
                    Sent automatically by Feed Program · panosg1138.github.io/work/feed_tracker.html
                  </div>
                </div>
              </body>
              </html>
              """

              send_email(subject, html_body, text_body)
              print(f"Email sent to {NOTIFY_EMAIL} for {count} feed change(s).")
          PYEOF
