<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Program — Poultry Nutrition Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="theme.css">
<style>
:root{--zoom:unset}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gh-canvas-default);color:var(--gh-fg-default);min-height:100vh;}

/* HEADER */
.header{background:var(--gh-canvas-subtle);border-bottom:1px solid var(--gh-border-default);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{font-size:18px}
.header-title{font-size:15px;font-weight:600;color:var(--gh-fg-default)}
.header-sub{font-size:12px;color:var(--gh-fg-muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* SYNC BADGE */
.sync-badge{display:flex;align-items:center;gap:6px;height:28px;padding:0 10px;border:1px solid var(--gh-border-default);border-radius:var(--rs);font-size:12px;font-weight:500;color:var(--gh-fg-muted);background:var(--gh-canvas-subtle);white-space:nowrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gh-fg-subtle);flex-shrink:0;}
.sync-badge.ok .sync-dot{background:var(--gh-success-fg);}
.sync-badge.ok{color:var(--gh-success-fg);border-color:rgba(63,185,80,0.3);}
.sync-badge.err .sync-dot{background:var(--gh-danger-fg);}
.sync-badge.err{color:var(--gh-danger-fg);border-color:rgba(248,81,73,0.3);}
.sync-badge.loading .sync-dot{background:var(--gh-accent-fg);animation:pulse 1s infinite;}
.sync-badge.loading{color:var(--gh-accent-fg);border-color:rgba(56,139,253,0.3);}
.sync-badge.saving .sync-dot{background:var(--gh-attention-fg);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ZOOM */
.zoom-ctrl{display:flex;align-items:center;gap:4px}
.zoom-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid var(--gh-border-default);border-radius:var(--rs);background:var(--gh-canvas-subtle);color:var(--gh-fg-muted);font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s,color 0.15s;user-select:none;}
.zoom-btn:hover{background:var(--gh-hover-bg);color:var(--gh-fg-default)}
.zoom-label{font-size:12px;color:var(--gh-fg-muted);min-width:36px;text-align:center}

/* THEME */
.theme-toggle{display:flex;align-items:center;gap:6px;height:28px;padding:0 10px;border:1px solid var(--gh-border-default);border-radius:var(--rs);background:var(--gh-canvas-subtle);color:var(--gh-fg-muted);font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;user-select:none;}
.theme-toggle:hover{background:var(--gh-hover-bg);color:var(--gh-fg-default);border-color:var(--gh-fg-subtle)}

/* OFFLINE OVERLAY */
.offline-overlay{display:none;position:fixed;inset:0;background:rgba(1,4,9,0.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;backdrop-filter:blur(3px);}
.offline-overlay.active{display:flex;}
.offline-msg{font-size:15px;font-weight:600;color:var(--gh-danger-fg);text-align:center;line-height:1.6;}
.offline-msg span{display:block;font-size:12px;font-weight:400;color:var(--gh-fg-muted);margin-top:6px;}
.offline-retry{display:flex;align-items:center;gap:6px;height:32px;padding:0 14px;border:1px solid var(--gh-border-default);border-radius:var(--rs);background:var(--gh-canvas-subtle);color:var(--gh-fg-default);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s;}
.offline-retry:hover{background:var(--gh-hover-bg);}

/* MAIN */
.main{padding:16px;transform-origin:top left;}

/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--gh-border-default);border-radius:var(--r);background:var(--gh-canvas-subtle);}
table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
thead tr{background:var(--gh-canvas-inset);border-bottom:1px solid var(--gh-border-default);}
thead th{padding:8px 10px;font-size:11px;font-weight:600;color:var(--gh-fg-muted);text-align:left;text-transform:uppercase;letter-spacing:0.04em;border-right:1px solid var(--gh-border-muted);}
thead th:last-child{border-right:none}
thead th.phase-col{text-align:center;color:var(--gh-accent-fg)}
tbody tr{border-bottom:1px solid var(--gh-border-muted);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--gh-hover-bg)}
tbody td{padding:9px 10px;color:var(--gh-fg-default);border-right:1px solid var(--gh-border-muted);vertical-align:middle;}
tbody td:last-child{border-right:none}
tbody td.phase-col{text-align:center}

/* INPUTS */
.cell-input{background:transparent;border:1px solid transparent;border-radius:4px;color:var(--gh-fg-default);font-family:'Inter',system-ui,sans-serif;font-size:13px;padding:3px 6px;width:100%;transition:border-color 0.15s,background 0.15s;outline:none;}
.cell-input:hover{border-color:var(--gh-border-default);background:var(--gh-canvas-default)}
.cell-input:focus{border-color:var(--gh-accent-emphasis);background:var(--gh-canvas-default);box-shadow:0 0 0 3px rgba(31,111,235,0.3)}
.cell-input:disabled{opacity:0.45;cursor:not-allowed;}
select.cell-input{cursor:pointer;padding-right:4px}
select.cell-input option{background:var(--gh-canvas-subtle);color:var(--gh-fg-default)}
select.cell-input option:disabled{color:var(--gh-fg-subtle);}

/* DATE TEXT INPUT */
.date-text-input{background:transparent;border:1px solid transparent;border-radius:4px;color:var(--gh-fg-default);font-family:'Inter',system-ui,sans-serif;font-size:13px;padding:3px 6px;width:115px;transition:border-color 0.15s,background 0.15s;outline:none;}
.date-text-input:hover{border-color:var(--gh-border-default);background:var(--gh-canvas-default)}
.date-text-input:focus{border-color:var(--gh-accent-emphasis);background:var(--gh-canvas-default);box-shadow:0 0 0 3px rgba(31,111,235,0.3)}
.date-text-input:disabled{opacity:0.45;cursor:not-allowed;}
.date-text-input::placeholder{color:var(--gh-fg-subtle);}
.date-text-input.invalid{border-color:var(--gh-danger-fg) !important;box-shadow:0 0 0 3px var(--gh-danger-subtle) !important;}

/* PHASE CELLS */
.phase-cell{display:flex;flex-direction:column;align-items:center;gap:4px;}
.phase-label{font-size:11px;font-weight:600;color:var(--gh-fg-muted);letter-spacing:0.03em;text-transform:uppercase;}
.phase-empty{font-size:12px;color:var(--gh-border-default);}

/* DATE CHIPS */
.date-chip{display:inline-block;padding:2px 9px;border-radius:12px;font-size:12px;font-weight:500;background:var(--gh-accent-subtle);color:var(--gh-accent-fg);border:1px solid rgba(56,139,253,0.2);font-variant-numeric:tabular-nums;}
.date-chip.past{background:var(--gh-canvas-inset);color:var(--gh-fg-subtle);border-color:var(--gh-border-muted);}
.date-chip.today{background:var(--gh-success-subtle);color:var(--gh-success-fg);border-color:rgba(63,185,80,0.3);}
.date-chip.soon{background:var(--gh-attention-subtle);color:var(--gh-attention-fg);border-color:rgba(210,153,34,0.3);}

/* LEGEND */
.legend{display:flex;gap:16px;align-items:center;padding:10px 16px;font-size:12px;color:var(--gh-fg-muted);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gh-canvas-subtle);border:1px solid var(--gh-border-default);border-radius:var(--r);padding:8px 16px;font-size:13px;color:var(--gh-fg-default);z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate" style="position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Inter',system-ui,sans-serif">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;width:360px;text-align:center">
    <h2 style="font-weight:700;font-size:20px;color:#e6edf3;margin-bottom:8px">Feed Program</h2>
    <p style="font-size:13px;color:#8b949e;margin-bottom:22px">Σύνδεση</p>
    <input type="email" id="auth-email" placeholder="Email…" autocomplete="username"
      style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:inherit;font-size:14px;padding:8px 10px;outline:none;margin-bottom:10px;box-sizing:border-box;text-align:center"
      onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
    <input type="password" id="auth-password" placeholder="Κωδικός…" autocomplete="current-password"
      style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:inherit;font-size:14px;padding:8px 10px;outline:none;margin-bottom:12px;box-sizing:border-box;text-align:center"
      onkeydown="if(event.key==='Enter')signIn()">
    <button id="auth-btn" onclick="signIn()"
      style="width:100%;padding:8px 16px;background:#1f6feb;color:#fff;border:none;border-radius:6px;font-family:inherit;font-weight:500;font-size:14px;cursor:pointer">Είσοδος</button>
    <div id="auth-error" style="font-size:12px;color:#f85149;margin-top:8px;min-height:18px"></div>
  </div>
</div>

<!-- OFFLINE OVERLAY — shown when Supabase is unreachable -->
<div class="offline-overlay" id="offline-overlay">
  <div class="offline-msg">
    ⚠ No connection to database
    <span>Editing is disabled until the connection is restored.</span>
  </div>
  <button class="offline-retry" onclick="retryConnection()">↻ Retry</button>
</div>

<div class="header">
  <div class="header-left">
    <span class="header-icon">🐔</span>
    <div>
      <div class="header-title">Feed Program</div>
      <div class="header-sub">Poultry Nutrition Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-badge" id="sync-badge">
      <div class="sync-dot"></div>
      <span id="sync-text">Connecting…</span>
    </div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="changeZoom(-0.1)" title="Zoom out">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" onclick="changeZoom(0.1)" title="Zoom in">+</button>
    </div>
    <button class="theme-toggle" onclick="printSummary()" title="Print summary">
      <span>🖨</span>
      <span>Print</span>
    </button>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">☀</span>
      <span id="theme-label">Light</span>
    </button>
    <button class="theme-toggle" id="btn-logout" onclick="signOut()" style="display:none" title="Sign out">← Sign out</button>
  </div>
</div>

<div class="main" id="main">
  <div class="table-wrap">
    <table>
      <thead><tr id="header-row"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div class="legend">
    <span style="font-weight:500">Legend:</span>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gh-fg-subtle)"></span> Past</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gh-attention-fg)"></span> Within 7 days</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gh-success-fg)"></span> Current</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gh-accent-fg)"></span> Upcoming</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const SB_URL = 'https://oorhbrphdbigwgizejcc.supabase.co';
const SB_KEY = 'sb_publishable_1S3L1sNMOjr-YgwGAAD2Kg_X_3S4cTl';

// ── AUTH ──────────────────────────────────────────────────────────
const _sb = supabase.createClient(SB_URL, SB_KEY);
let _authSession = null;

async function signIn() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-password').value;
  const btn   = document.getElementById('auth-btn');
  const errEl = document.getElementById('auth-error');
  btn.disabled = true; btn.textContent = 'Σύνδεση…';
  errEl.textContent = '';
  const { error } = await _sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    errEl.textContent = 'Λάθος email ή κωδικός.';
    btn.disabled = false; btn.textContent = 'Είσοδος';
  }
}

async function signOut() { await _sb.auth.signOut(); }

_sb.auth.onAuthStateChange((event, session) => {
  _authSession = session;
  document.getElementById('auth-gate').style.display = session ? 'none' : 'flex';
  document.getElementById('btn-logout').style.display = session ? '' : 'none';
  if (session && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION')) {
    loadFromSupabase();
  } else if (!session) {
    setTimeout(() => { const e = document.getElementById('auth-email'); if(e) e.focus(); }, 100);
  }
});

// ── FEED SCHEDULES ───────────────────────────────────────────────
// Real schedules — only these 3 exist. Do not invent numbers for breeds
// that don't have a schedule key in BREED_SCHEDULE below.
const BREEDS = {
  'NOVOGEN': { phases: ['0-5 Wks','6-10 Wks','11-15 Wks','16-2%'],            days: [0,35,70,105] },
  'HY-LINE': { phases: ['0-3 Wks','4-6 Wks','7-12 Wks','13-15 Wks','PRELAY'], days: [0,22,42,84,105] },
  'ISA':     { phases: ['0-5 Wks','6-10 Wks','11-16 Wks','17-2%'],            days: [0,35,70,119] }
};

// Dropdown breed name → schedule key above. null = no schedule yet (shows "—").
const BREED_SCHEDULE = {
  'Hy-Line Brown':  'HY-LINE',
  'Novogen Brown':  'NOVOGEN',
  'Novogen White':  'NOVOGEN',
  'Novogen Tinted': 'NOVOGEN',
  'ISA Brown':      'ISA',
  'Dekalb White':   null,
  'H&N Brown':      null,
  'H&N White':      null,
  'H&N Coral':      null
};

const REARING_TYPES = ['Cage', 'Barn'];
const HOUSES     = ['Θ1','Θ2','Θ3','Θ4','Θ5','Θ6'];
const NUM_ROWS   = 6;
const MAX_PHASES = Math.max(...Object.values(BREEDS).map(b => b.phases.length));

// ── STATE ────────────────────────────────────────────────────────
let rows       = Array.from({length: NUM_ROWS}, () => ({id: null, house:'', breed:'', hatch:'', rearing_type:''}));
let saveTimers = {};
let isOnline   = false;   // gate — no edits until Supabase confirmed reachable

// ── ONLINE GATE ──────────────────────────────────────────────────
function setOnline(online) {
  isOnline = online;
  document.getElementById('offline-overlay').classList.toggle('active', !online);
  // Enable / disable all inputs
  document.querySelectorAll('.cell-input, .date-text-input').forEach(el => {
    el.disabled = !online;
  });
}

async function retryConnection() {
  setSyncState('loading', 'Connecting…');
  await loadFromSupabase();
}

// ── SUPABASE HELPERS ─────────────────────────────────────────────
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey':        SB_KEY,
      'Authorization': `Bearer ${_authSession.access_token}`,
      'Content-Type':  'application/json',
      'Prefer':        options.prefer || '',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── LOAD FROM SUPABASE ───────────────────────────────────────────
async function loadFromSupabase() {
  setSyncState('loading', 'Connecting…');
  try {
    const data = await sbFetch('feed_hatches?select=*&order=row_index.asc');
    rows = Array.from({length: NUM_ROWS}, () => ({id: null, house:'', breed:'', hatch:'', rearing_type:''}));
    for (const rec of data) {
      const idx = rec.row_index;
      if (idx >= 0 && idx < NUM_ROWS) {
        rows[idx] = {
          id:    rec.id,
          house: rec.house || '',
          breed: rec.breed || '',
          hatch: rec.hatch || '',
          rearing_type: rec.rearing_type || ''
        };
      }
    }
    setOnline(true);
    setSyncState('ok', 'Synced');
    buildRows();
  } catch(e) {
    console.error('Load error:', e);
    setOnline(false);
    setSyncState('err', 'No connection');
    buildRows();   // render read-only state with whatever is in rows
  }
}

// ── SAVE ROW (debounced 600ms) ───────────────────────────────────
function saveRow(idx) {
  if (!isOnline) return;
  localStorage.setItem('feed_tracker_rows', JSON.stringify(rows));
  clearTimeout(saveTimers[idx]);
  saveTimers[idx] = setTimeout(() => persistRow(idx), 600);
}

async function persistRow(idx) {
  if (!isOnline) return;
  const r = rows[idx];
  setSyncState('saving', 'Saving…');
  try {
    const payload = {
      row_index: idx,
      house: r.house || null,
      breed: r.breed || null,
      hatch: r.hatch || null,
      rearing_type: r.rearing_type || null
    };
    if (r.id) {
      await sbFetch(`feed_hatches?id=eq.${r.id}`, {
        method: 'PATCH',
        prefer: 'return=representation',
        body: JSON.stringify(payload)
      });
    } else {
      const result = await sbFetch('feed_hatches', {
        method: 'POST',
        prefer: 'return=representation',
        body: JSON.stringify(payload)
      });
      if (result && result[0]) rows[idx].id = result[0].id;
    }
    setSyncState('ok', 'Saved ✓');
    setTimeout(() => setSyncState('ok', 'Synced'), 1500);
  } catch(e) {
    console.error('Save error:', e);
    setOnline(false);
    setSyncState('err', 'No connection');
  }
}

// ── SYNC BADGE ───────────────────────────────────────────────────
function setSyncState(state, text) {
  const badge = document.getElementById('sync-badge');
  badge.className = 'sync-badge ' + state;
  document.getElementById('sync-text').textContent = text;
}

// ── DATE HELPERS ─────────────────────────────────────────────────
// Parse flexible date input: dd/mm/yy, dd/mm/yyyy, dd-mm-yy, dd-mm-yyyy
// Returns ISO string "YYYY-MM-DD" or null if invalid.
function parseFlexDate(raw) {
  if (!raw) return null;
  const s = raw.trim().replace(/-/g, '/');
  const parts = s.split('/');
  if (parts.length !== 3) return null;

  const dd  = parseInt(parts[0], 10);
  const mm  = parseInt(parts[1], 10);
  let   yy  = parseInt(parts[2], 10);

  if (isNaN(dd) || isNaN(mm) || isNaN(yy)) return null;

  // Expand 2-digit year: 00-99 → 2000-2099
  if (yy >= 0 && yy <= 99) yy += 2000;

  if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;

  // Zero-pad and build ISO
  const iso = `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  // Validate via Date object
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  return iso;
}

function isoToDisplay(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function addDays(iso, days) {
  if (!iso) return null;
  const d = new Date(iso);
  d.setDate(d.getDate() + days);
  return d;
}

function fmtDate(d) {
  if (!d) return null;
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'numeric'});
}

// ── HOUSE EXCLUSIVITY ────────────────────────────────────────────
// Returns set of house values currently used (excluding the given rowIdx)
function usedHouses(excludeIdx) {
  const used = new Set();
  rows.forEach((r, i) => { if (i !== excludeIdx && r.house) used.add(r.house); });
  return used;
}

// Refresh all house dropdowns to disable already-selected houses in other rows
function refreshHouseDropdowns() {
  for (let i = 0; i < NUM_ROWS; i++) {
    const sel = document.getElementById(`house-${i}`);
    if (!sel) continue;
    const used = usedHouses(i);
    Array.from(sel.options).forEach(opt => {
      if (!opt.value) return;   // skip the blank "—" option
      opt.disabled = used.has(opt.value);
    });
  }
}

// ── BUILD HEADER ─────────────────────────────────────────────────
function buildHeader() {
  let html = `<th style="min-width:130px">Hatch Date</th><th style="min-width:80px">House</th><th style="min-width:110px">Breed</th><th style="min-width:90px">Type</th>`;
  for (let i = 0; i < MAX_PHASES; i++) {
    html += `<th class="phase-col" style="min-width:130px">Phase ${i+1}</th>`;
  }
  document.getElementById('header-row').innerHTML = html;
}

// ── BUILD ROWS ────────────────────────────────────────────────────
function buildRows() {
  const tbody = document.getElementById('table-body');
  let html = '';
  for (let i = 0; i < NUM_ROWS; i++) {
    const r = rows[i];
    const displayHatch = isoToDisplay(r.hatch);

    html += `<tr id="row-${i}">`;

    // Hatch date — text input with flex parsing
    html += `<td>
      <input type="text"
        class="date-text-input"
        id="hatch-${i}"
        value="${displayHatch}"
        placeholder="dd/mm/yy"
        maxlength="10"
        autocomplete="off"
        ${!isOnline ? 'disabled' : ''}
        onblur="onHatchBlur(${i}, this)"
        onkeydown="if(event.key==='Enter')this.blur()">
    </td>`;

    // House dropdown
    html += `<td><select class="cell-input" id="house-${i}" onchange="onHouseChange(${i},this.value)" ${!isOnline ? 'disabled' : ''}>
      <option value="">—</option>
      ${HOUSES.map(h => `<option value="${h}"${r.house===h?' selected':''}>${h}</option>`).join('')}
    </select></td>`;

    // Breed dropdown
    html += `<td><select class="cell-input" id="breed-${i}" onchange="onBreedChange(${i},this.value)" ${!isOnline ? 'disabled' : ''}>
      <option value="">—</option>
      ${Object.keys(BREED_SCHEDULE).map(b => `<option value="${b}"${r.breed===b?' selected':''}>${b}</option>`).join('')}
    </select></td>`;

    // Rearing type dropdown
    html += `<td><select class="cell-input" id="type-${i}" onchange="onRearingTypeChange(${i},this.value)" ${!isOnline ? 'disabled' : ''}>
      <option value="">—</option>
      ${REARING_TYPES.map(t => `<option value="${t}"${r.rearing_type===t?' selected':''}>${t}</option>`).join('')}
    </select></td>`;

    // Phase cells
    for (let p = 0; p < MAX_PHASES; p++) {
      html += `<td class="phase-col" id="phase-${i}-${p}"></td>`;
    }
    html += '</tr>';
  }
  tbody.innerHTML = html;

  // Apply house exclusivity and render phase dates
  refreshHouseDropdowns();
  for (let i = 0; i < NUM_ROWS; i++) updatePhaseDates(i);
}

// ── UPDATE PHASE DATES ────────────────────────────────────────────
// Green = current active phase (started but next hasn't begun yet)
// Grey  = past phases already replaced
// Orange = next phase due within 7 days
// Blue  = future phases
// Shared by updatePhaseDates (table) and printSummary (printout) so the
// "current" phase is always computed the same way in both places.
// Returns null if the row is incomplete.
function computeActivePhase(r) {
  if (!r.breed || !r.hatch) return null;
  const scheduleKey = BREED_SCHEDULE[r.breed];
  if (!scheduleKey) return null;   // breed has no schedule assigned yet
  const today = new Date(); today.setHours(0,0,0,0);
  const breed = BREEDS[scheduleKey];

  // Build all phase Date objects once per row (not once per phase)
  const phaseDates = breed.days.map(d => {
    const dt = addDays(r.hatch, d);
    dt.setHours(0,0,0,0);
    return dt;
  });

  // Active phase = last index whose start date is today or in the past
  let activeIdx = -1;
  for (let i = 0; i < phaseDates.length; i++) {
    if (phaseDates[i] <= today) activeIdx = i;
  }

  return { breed, phaseDates, activeIdx };
}

function updatePhaseDates(rowIdx) {
  const r = rows[rowIdx];
  const active = computeActivePhase(r);

  // Bail early if row is incomplete — clear all phase cells
  if (!active) {
    for (let p = 0; p < MAX_PHASES; p++) {
      const cell = document.getElementById(`phase-${rowIdx}-${p}`);
      if (cell) cell.innerHTML = `<span class="phase-empty">—</span>`;
    }
    return;
  }

  const { breed, phaseDates, activeIdx } = active;
  const today = new Date(); today.setHours(0,0,0,0);

  for (let p = 0; p < MAX_PHASES; p++) {
    const cell = document.getElementById(`phase-${rowIdx}-${p}`);
    if (!cell) continue;

    if (p >= breed.phases.length) {
      cell.innerHTML = `<span class="phase-empty">—</span>`;
      continue;
    }

    const phaseDate = phaseDates[p];
    let cls = '';
    if (p === activeIdx) {
      cls = 'today';                                        // green — currently on this feed
    } else if (p < activeIdx) {
      cls = 'past';                                         // grey  — already replaced
    } else {
      const diff = Math.round((phaseDate - today) / 86400000);
      cls = diff <= 7 ? 'soon' : '';                        // orange ≤7 days, blue otherwise
    }

    cell.innerHTML = `<div class="phase-cell"><span class="phase-label">${breed.phases[p]}</span><span class="date-chip ${cls}">${fmtDate(phaseDate)||'—'}</span></div>`;
  }
}

// ── PRINT SUMMARY ─────────────────────────────────────────────────
function printSummary() {
  const lines = [];
  for (let i = 0; i < NUM_ROWS; i++) {
    const r = rows[i];
    if (!r.house || !r.breed || !r.hatch || !r.rearing_type) continue;
    const active = computeActivePhase(r);
    if (!active || active.activeIdx < 0) continue;   // no phase currently active
    const phaseLabel = active.breed.phases[active.activeIdx];
    lines.push({
      house: r.house,
      text: `Hatch Date: ${isoToDisplay(r.hatch)}, ${r.house}, ${r.breed}, ${r.rearing_type}, ${phaseLabel}`
    });
  }
  lines.sort((a, b) => parseInt(a.house.slice(1), 10) - parseInt(b.house.slice(1), 10));

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Feed Program — Current Status</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;color:#000;background:#fff;padding:24px}
h1{font-size:18px;margin-bottom:4px}
.date{font-size:13px;color:#555;margin-bottom:20px}
.line{font-size:14px;margin-bottom:8px}
</style></head><body>
<h1>Feed Program — Current Status</h1>
<div class="date">${fmtDate(new Date())}</div>
${lines.map(l => `<div class="line">${l.text}</div>`).join('')}
</body></html>`);
  win.document.close();
  win.focus();
  win.print();
}

// ── EVENT HANDLERS ────────────────────────────────────────────────
function onHatchBlur(idx, input) {
  if (!isOnline) return;
  const raw = input.value.trim();
  if (!raw) {
    // Cleared
    input.classList.remove('invalid');
    rows[idx].hatch = '';
    updatePhaseDates(idx);
    saveRow(idx);
    return;
  }
  const iso = parseFlexDate(raw);
  if (!iso) {
    input.classList.add('invalid');
    showToast('Invalid date — use dd/mm/yy or dd/mm/yyyy');
    return;
  }
  input.classList.remove('invalid');
  input.value = isoToDisplay(iso);   // normalise display to dd/mm/yyyy
  rows[idx].hatch = iso;
  updatePhaseDates(idx);
  saveRow(idx);
}

function onHouseChange(idx, val) {
  if (!isOnline) return;
  rows[idx].house = val;
  refreshHouseDropdowns();
  saveRow(idx);
}

function onBreedChange(idx, val) {
  if (!isOnline) return;
  rows[idx].breed = val;
  updatePhaseDates(idx);
  saveRow(idx);
}

function onRearingTypeChange(idx, val) {
  if (!isOnline) return;
  rows[idx].rearing_type = val;
  saveRow(idx);
}

// ── ZOOM ──────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('feed_zoom') || '1');
function applyZoom() {
  zoom = Math.max(0.5, Math.min(2, Math.round(zoom * 10) / 10));
  const m = document.getElementById('main');
  m.style.transform      = `scale(${zoom})`;
  m.style.width          = `calc(100% / ${zoom})`;
  m.style.transformOrigin = 'top left';
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('feed_zoom', zoom);
}
function changeZoom(delta) { zoom += delta; applyZoom(); }

// ── THEME ─────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const isDark = theme === 'dark';
  document.getElementById('theme-icon').textContent  = isDark ? '☀' : '☾';
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
  localStorage.setItem('feed_theme', theme);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────
applyZoom();
applyTheme(localStorage.getItem('feed_theme') || 'dark');
buildHeader();
// Data load triggered by onAuthStateChange after sign-in
</script>
