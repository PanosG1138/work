<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΚΑΜΠΟΣΟΣ — Φόρτωση Καρότσας</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="theme.css">
<style>
  /* Crate-visualization palette — kept exact, not themed (cell layout, gap/heat-buffer
     graphics, cab/hitch icons must render identically regardless of chrome restyle). */
  :root{
    --crate-4: #D98B33;
    --crate-3: #3E8E7E;
    --metal: #2B3542;
    --viz-panel: #20252D;
    --viz-border: #3C4450;
    --viz-muted: #616B78;
    --viz-cab-text: #9099A6;
    --box-h: 96px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--gh-canvas-default);
    color:var(--gh-fg-default);
    font-family:'Inter',system-ui,sans-serif;
    padding:28px 20px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  h1{
    font-family:'Inter',system-ui,sans-serif;
    font-weight:600;
    font-size:22px;
    margin:0;
    color:var(--gh-fg-default);
  }
  .subtitle{color:var(--gh-fg-muted);font-size:14px;margin:4px 0 28px;}
  .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

  /* ── Shared chrome controls (buttons, badges, gate) ── */
  .btn-tool{
    height:32px;padding:0 14px;
    background:var(--gh-canvas-subtle);
    border:1px solid var(--gh-border-default);
    color:var(--gh-fg-default);
    border-radius:var(--rs);
    font-family:'Inter',system-ui,sans-serif;
    font-size:13px;font-weight:500;
    cursor:pointer;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
    transition:background 0.15s,border-color 0.15s;
  }
  .btn-tool:hover{background:var(--gh-hover-bg);border-color:var(--gh-fg-subtle)}
  .sync-badge{display:flex;align-items:center;gap:5px;font-size:12px;padding:0 10px;height:28px;border-radius:99px;border:1px solid var(--gh-border-default);background:var(--gh-canvas-subtle);color:var(--gh-fg-muted);white-space:nowrap;transition:all 0.25s}
  .sync-badge.ok{border-color:rgba(63,185,80,0.4);color:var(--gh-success-fg);background:var(--gh-success-subtle)}
  .sync-badge.err{border-color:rgba(248,81,73,0.4);color:var(--gh-danger-fg);background:var(--gh-danger-subtle)}
  .sync-badge.loading{border-color:rgba(210,153,34,0.4);color:var(--gh-attention-fg);background:var(--gh-attention-subtle)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .sync-badge.loading .sync-dot{animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

  .modal-bg{position:fixed;inset:0;background:var(--gh-canvas-default);display:flex;align-items:center;justify-content:center;z-index:200}
  .name-gate{background:var(--gh-canvas-subtle);border:1px solid var(--gh-border-default);border-radius:var(--r);padding:32px;width:360px;text-align:center}
  .name-gate h2{font-weight:700;font-size:20px;color:var(--gh-fg-default);margin-bottom:8px}
  .name-gate p{font-size:13px;color:var(--gh-fg-muted);margin-bottom:22px;line-height:1.6}
  .name-gate input{width:100%;background:var(--gh-canvas-default);border:1px solid var(--gh-border-default);border-radius:var(--rs);color:var(--gh-fg-default);font-family:inherit;font-size:15px;padding:8px;margin-bottom:12px;text-align:center;outline:none}
  .name-gate input:focus{border-color:var(--gh-accent-emphasis);box-shadow:0 0 0 3px rgba(31,111,235,0.3)}
  .btn-primary{width:100%;height:36px;background:var(--gh-accent-emphasis);color:#fff;border:1px solid rgba(240,246,252,0.1);border-radius:var(--rs);font-family:inherit;font-weight:500;font-size:14px;cursor:pointer}
  .btn-primary:hover{background:#388bfd}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
  .gate-error{font-size:12px;color:var(--gh-danger-fg);margin-top:8px;min-height:18px}

  .offline-overlay{display:none;position:fixed;inset:0;background:rgba(1,4,9,0.85);z-index:150;align-items:center;justify-content:center;flex-direction:column;gap:12px;backdrop-filter:blur(3px)}
  .offline-overlay.active{display:flex}
  .offline-msg{font-size:15px;font-weight:600;color:var(--gh-danger-fg);text-align:center;line-height:1.6}
  .offline-msg span{display:block;font-size:12px;font-weight:400;color:var(--gh-fg-muted);margin-top:6px}

  /* ── Section panels (chrome) ── */
  .section{
    background:var(--gh-canvas-subtle);
    border:1px solid var(--gh-border-default);
    border-radius:var(--r);
    padding:20px 22px 22px;
    margin-bottom:22px;
  }
  .section.disabled{opacity:0.4;}
  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:18px;
  }
  .section-title-row{display:flex;align-items:center;gap:12px;}
  .section-title{
    font-family:'Inter',system-ui,sans-serif;
    font-weight:600;
    font-size:17px;
    color:var(--gh-fg-default);
  }
  .cap-note{font-size:11px;color:var(--gh-fg-muted);}
  .toggle-btn{
    background:var(--gh-canvas-default);
    border:1px solid var(--gh-border-default);
    color:var(--gh-fg-muted);
    font-size:12px;
    font-weight:600;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .toggle-btn.on{border-color:var(--gh-accent-emphasis);background:var(--gh-accent-subtle);color:var(--gh-accent-fg);}
  .controls{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--gh-fg-muted);text-transform:uppercase;letter-spacing:0.5px;}
  .field input{
    width:64px;
    background:var(--gh-canvas-default);
    border:1px solid var(--gh-border-default);
    color:var(--gh-fg-default);
    border-radius:var(--rs);
    padding:7px 8px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:500;
  }
  .field input:focus{outline:none;border-color:var(--gh-accent-emphasis);box-shadow:0 0 0 3px rgba(31,111,235,0.3);}
  .apply-btn{
    background:transparent;
    border:1px solid var(--gh-border-default);
    color:var(--gh-fg-muted);
    padding:8px 12px;
    border-radius:var(--rs);
    font-size:12px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    height:34px;
  }
  .apply-btn:hover{background:var(--gh-hover-bg);color:var(--gh-fg-default);}

  /* ── Top-down crate visualization — unchanged graphics ── */
  .rack{
    display:flex;
    align-items:flex-start;
    gap:0;
    overflow-x:auto;
    padding:10px 4px 14px;
    margin:0 0 18px;
    border-top:1px solid var(--viz-border);
    border-bottom:1px solid var(--viz-border);
  }
  .slot{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex-shrink:0;
  }
  .cell-col{
    height:var(--box-h);
    border:2px solid var(--viz-border);
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .cell-col.w4{width:80px;}
  .cell-col.w3{width:60px;}
  .cell{
    border-bottom:2px solid var(--viz-border);
  }
  .cell:last-child{border-bottom:none;}
  .cell.c4{background:var(--crate-4);flex:1;}
  .cell.c3{background:var(--crate-3);flex:3;}
  .cell.gap{flex:1;}
  .hatch-fill{
    background-image:
      repeating-linear-gradient(45deg, var(--viz-muted) 0 1.5px, transparent 1.5px 8px),
      repeating-linear-gradient(-45deg, var(--viz-muted) 0 1.5px, transparent 1.5px 8px);
    background-color:var(--viz-panel);
  }
  .heat-buffer{height:var(--box-h);width:38px;border:2px solid var(--viz-border);box-sizing:border-box;}
  .slot-controls{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 3px;}
  .rig-label{font-size:9px;color:var(--viz-muted);text-transform:uppercase;text-align:center;letter-spacing:0.5px;}
  .cab{
    width:70px;
    height:var(--box-h);
    background:var(--metal);
    border:2px solid var(--viz-border);
    box-sizing:border-box;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--viz-cab-text);
    font-size:11px;
    font-weight:600;
    text-align:center;
    padding:0 4px;
  }
  .hitch{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    width:34px;
    height:var(--box-h);
  }
  .hitch-bar{width:24px;height:6px;background:var(--viz-muted);border-radius:3px;}
  .hitch-pin{width:15px;height:15px;border-radius:50%;background:var(--viz-muted);border:3px solid var(--gh-canvas-subtle);}

  /* ── Per-position edit controls (chrome) ── */
  .type-btn{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:13px;
    width:32px;
    height:26px;
    border-radius:6px;
    border:1px solid var(--gh-border-default);
    cursor:pointer;
    background:var(--gh-canvas-default);
    color:var(--gh-fg-default);
  }
  .type-btn.w3{color:var(--crate-3);}
  .type-btn.w4{color:var(--crate-4);}
  .height-stack{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:76px;}
  .height-input{
    width:30px;
    background:var(--gh-canvas-default);
    border:1px solid var(--gh-border-default);
    color:var(--gh-fg-default);
    border-radius:6px;
    padding:3px 2px;
    text-align:center;
    font-family:'Inter',sans-serif;
    font-size:11px;
  }
  .move-row{display:flex;gap:3px;}
  .icon-btn{
    background:transparent;
    border:1px solid var(--gh-border-default);
    color:var(--gh-fg-muted);
    width:22px;
    height:22px;
    border-radius:5px;
    cursor:pointer;
    font-size:11px;
    line-height:1;
    padding:0;
  }
  .icon-btn:hover{color:var(--gh-fg-default);border-color:var(--gh-fg-subtle);}
  .icon-btn.remove:hover{color:var(--gh-danger-fg);border-color:var(--gh-danger-fg);}
  .icon-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .add-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .add-btn{
    background:var(--gh-canvas-default);
    border:1px dashed var(--gh-border-default);
    color:var(--gh-fg-muted);
    padding:8px 16px;
    border-radius:var(--rs);
    cursor:pointer;
    font-size:13px;
    font-weight:500;
    font-family:'Inter',sans-serif;
  }
  .add-btn:hover{background:var(--gh-hover-bg);color:var(--gh-fg-default);}
  .add-btn.w4{border-color:var(--crate-4);color:var(--crate-4);}
  .add-btn.w3{border-color:var(--crate-3);color:var(--crate-3);}
  .add-btn:disabled{opacity:0.35;cursor:not-allowed;border-style:solid;}

  /* ── Totals cards (chrome) ── */
  .totals{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .tcard{
    background:var(--gh-canvas-default);
    border:1px solid var(--gh-border-default);
    border-radius:var(--rs);
    padding:10px 12px;
  }
  .tcard .tlabel{font-size:11px;color:var(--gh-fg-muted);margin-bottom:4px;}
  .tcard .tval{font-family:'Inter',sans-serif;font-size:19px;font-weight:700;color:var(--gh-fg-default);}
  .tcard.total{background:var(--gh-accent-subtle);border-color:var(--gh-accent-emphasis);}
  .tcard.total .tlabel{color:var(--gh-accent-fg);opacity:0.8;}
  .tcard.total .tval{color:var(--gh-accent-fg);}
  .grand{
    margin-top:8px;
    background:var(--gh-accent-subtle);
    border:1px solid var(--gh-accent-emphasis);
    border-radius:var(--r);
    padding:20px 26px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .grand .glabel{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--gh-fg-default);
  }
  .grand .gval{
    font-family:'Inter',sans-serif;
    font-size:32px;
    font-weight:700;
    color:var(--gh-accent-fg);
  }
  @media (max-width:640px){
    .totals{grid-template-columns:repeat(2,1fr);}
    h1{font-size:18px;}
  }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate" class="modal-bg">
  <div class="name-gate">
    <h2>ΚΑΜΠΟΣΟΣ</h2>
    <p>Φόρτωση Καρότσας<br>Σύνδεση</p>
    <input type="email" id="auth-email" placeholder="Email…" autocomplete="username"
           onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
    <input type="password" id="auth-password" placeholder="Κωδικός…"
           autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()">
    <button class="btn-primary" id="auth-btn" onclick="signIn()">Είσοδος</button>
    <div class="gate-error" id="auth-error"></div>
  </div>
</div>

<!-- OFFLINE OVERLAY — shown only if the initial state load fails -->
<div class="offline-overlay" id="offline-overlay">
  <div class="offline-msg">⚠ Αδύνατη η σύνδεση με τη βάση<span id="offline-detail">Ανανεώστε τη σελίδα για να ξαναδοκιμάσετε.</span></div>
  <button class="btn-tool" onclick="location.reload()">↺ Ανανέωση</button>
</div>

<div class="wrap">
  <div class="top-row">
    <div>
      <h1>ΚΑΜΠΟΣΟΣ — Φόρτωση Καρότσας</h1>
      <p class="subtitle">Κάτοψη καρότσας — κάθε κελί είναι μία ντάνα κλουβιών, σε πραγματική διάταξη.</p>
    </div>
    <div class="top-actions">
      <div class="sync-badge loading" id="sync-badge"><div class="sync-dot"></div><span id="sync-text">Σύνδεση…</span></div>
      <button class="btn-tool" id="btn-logout" onclick="signOut()" style="display:none">← Έξοδος</button>
      <button class="btn-tool" onclick="printLoad()">🖨 Εκτύπωση φόρτωσης</button>
    </div>
  </div>

  <div id="sections"></div>

  <div class="grand">
    <span class="glabel">Σύνολο Φόρτωσης</span>
    <span class="gval" id="grandTotal">0</span>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SB_URL = 'https://oorhbrphdbigwgizejcc.supabase.co';
const SB_KEY = 'sb_publishable_1S3L1sNMOjr-YgwGAAD2Kg_X_3S4cTl';
const TABLE  = 'truck_load';

// ── AUTH ──────────────────────────────────────────────────────────
const _sb = supabase.createClient(SB_URL, SB_KEY);
let _authSession = null;
let currentUser = '';

function emailToDisplayName(email) {
  const m = {'panos@internal.local':'Πάνος','eleni@internal.local':'Ελένη'};
  return m[email] || email.split('@')[0];
}

async function signIn() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-password').value;
  const btn   = document.getElementById('auth-btn');
  const errEl = document.getElementById('auth-error');
  btn.disabled = true; btn.textContent = 'Σύνδεση…';
  errEl.textContent = '';
  const { error } = await _sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    errEl.textContent = 'Λάθος email ή κωδικός.';
    btn.disabled = false; btn.textContent = 'Είσοδος';
  }
}

async function signOut() { await _sb.auth.signOut(); }

_sb.auth.onAuthStateChange((event, session) => {
  _authSession = session;
  document.getElementById('auth-gate').style.display = session ? 'none' : 'flex';
  document.getElementById('btn-logout').style.display = session ? '' : 'none';
  if (session && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION')) {
    currentUser = emailToDisplayName(session.user.email);
    loadState();
  } else if (!session) {
    setTimeout(() => { const e = document.getElementById('auth-email'); if(e) e.focus(); }, 100);
  }
});

// ── SUPABASE ──────────────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${_authSession.access_token}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers,
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.hint || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function setSyncState(syncState, text) {
  const b = document.getElementById('sync-badge');
  b.className = 'sync-badge ' + syncState;
  document.getElementById('sync-text').textContent = text;
}

// ── STATE ↔ SUPABASE ROW (single pinned row, id=1, last-write-wins) ─
function stripSection(s) {
  return {
    enabled: s.enabled, baseHeight: s.baseHeight,
    positions: s.positions.map(p => ({ type: p.type, heights: p.heights }))
  };
}
// One-time read-time upgrade: old saved rows have {height} (one value for the
// whole position); expand to a {heights} array so every stack has its own value.
function migrateHeights(p) {
  return p.heights || mkHeights(p.type, p.height);
}
function applySnapshot(row) {
  ['truck', 'trailer'].forEach(key => {
    const snap = row[key];
    if (!snap) return;
    Object.assign(state[key], {
      enabled: snap.enabled, baseHeight: snap.baseHeight,
      positions: snap.positions.map(p => newPos(p.type, migrateHeights(p)))
    });
  });
}

let stateReady = false; // gates autosave until the initial load has resolved
async function loadState() {
  setSyncState('loading', 'Σύνδεση…');
  try {
    const rows = await sbFetch(`${TABLE}?id=eq.1&select=truck,trailer`);
    if (rows && rows.length) applySnapshot(rows[0]);
    setSyncState('ok', 'Συγχρονισμένο');
    document.getElementById('offline-overlay').classList.remove('active');
    stateReady = true;
    renderAll();
  } catch (e) {
    setSyncState('err', 'Σφάλμα φόρτωσης');
    document.getElementById('offline-detail').textContent = e.message;
    document.getElementById('offline-overlay').classList.add('active');
  }
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 500);
}
async function saveState() {
  setSyncState('loading', 'Αποθήκευση…');
  try {
    await sbFetch(TABLE, {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal',
      body: JSON.stringify({
        id: 1,
        truck: stripSection(state.truck),
        trailer: stripSection(state.trailer),
        updated_by: currentUser,
        updated_at: new Date().toISOString()
      })
    });
    setSyncState('ok', 'Συγχρονισμένο');
  } catch (e) {
    setSyncState('err', 'Σφάλμα αποθήκευσης: ' + e.message);
  }
}

// ── CRATE STATE ───────────────────────────────────────────────────
let uid = 1;
function newPos(type, heights){
  return { id: uid++, type: type, heights: heights };
}
function mkHeights(type, h){
  return Array(type).fill(h);
}

const LIMITS = {
  truck: { maxPositions: 9 },
  trailer: { maxPositions: 9 }
};

const state = {
  truck: {
    label: 'ΦΟΡΤΗΓΟ',
    enabled: true,
    baseHeight: 9,
    positions: [
      newPos(4,mkHeights(4,9)), newPos(3,mkHeights(3,9)), newPos(4,mkHeights(4,9)), newPos(3,mkHeights(3,9)),
      newPos(4,mkHeights(4,9)), newPos(3,mkHeights(3,9)), newPos(4,mkHeights(4,9)), newPos(3,mkHeights(3,9))
    ]
  },
  trailer: {
    label: 'ΡΥΜΟΥΛΚΑ',
    enabled: true,
    baseHeight: 9,
    positions: [
      newPos(3,mkHeights(3,9)), newPos(4,mkHeights(4,9)), newPos(3,mkHeights(3,9)), newPos(4,mkHeights(4,9)),
      newPos(4,mkHeights(4,9)), newPos(4,mkHeights(4,9)), newPos(4,mkHeights(4,9)), newPos(4,mkHeights(4,9)), newPos(4,mkHeights(4,9))
    ]
  }
};

function computeTotals(section){
  let t3 = 0, t4 = 0;
  section.positions.forEach(p => {
    const crates = p.heights.reduce((a, b) => a + b, 0);
    if (p.type === 3) t3 += crates; else t4 += crates;
  });
  const total = t3 + t4;
  return { t3, t4, total };
}

function positionBoxHTML(p){
  if(p.type === 4){
    return '<div class="cell-col w4">' +
      '<div class="cell c4"></div><div class="cell c4"></div><div class="cell c4"></div><div class="cell c4"></div>' +
    '</div>';
  }
  return '<div class="cell-col w3">' +
    '<div class="cell c3"></div>' +
    '<div class="cell gap hatch-fill"></div>' +
    '<div class="cell c3"></div>' +
    '<div class="cell gap hatch-fill"></div>' +
    '<div class="cell c3"></div>' +
  '</div>';
}

function renderSection(key){
  const s = state[key];
  const lim = LIMITS[key];
  const totals = computeTotals(s);

  let slotsHTML = '';

  if(key === 'truck'){
    slotsHTML += '<div class="slot"><div class="cab">ΚΑΜΠΙΝΑ</div></div>';
    slotsHTML += '<div class="slot"><div class="hatch-fill heat-buffer"></div><div class="slot-controls"><span class="rig-label">κενές</span></div></div>';
  }
  if(key === 'trailer'){
    slotsHTML += '<div class="slot"><div class="hitch"><div class="hitch-bar"></div><div class="hitch-pin"></div></div></div>';
    slotsHTML += '<div class="slot"><div class="hatch-fill heat-buffer"></div><div class="slot-controls"><span class="rig-label">κενές</span></div></div>';
  }

  s.positions.forEach((p, idx) => {
    const wClass = p.type === 4 ? 'w4' : 'w3';
    const heightInputs = p.heights.map((h, si) =>
      '<input class="height-input" type="number" min="0" value="' + h + '" onchange="setStackHeight(\'' + key + '\',' + p.id + ',' + si + ', this.value)">'
    ).join('');
    slotsHTML += '<div class="slot">' +
      positionBoxHTML(p) +
      '<div class="slot-controls">' +
        '<button class="type-btn ' + wClass + '" onclick="toggleType(\'' + key + '\',' + p.id + ')">' + p.type + '</button>' +
        '<div class="height-stack">' + heightInputs + '</div>' +
        '<div class="move-row">' +
          '<button class="icon-btn" title="Μετακίνηση αριστερά" onclick="movePos(\'' + key + '\',' + p.id + ',-1)" ' + (idx===0?'disabled':'') + '>&#9664;</button>' +
          '<button class="icon-btn remove" title="Αφαίρεση" onclick="removePos(\'' + key + '\',' + p.id + ')">&times;</button>' +
          '<button class="icon-btn" title="Μετακίνηση δεξιά" onclick="movePos(\'' + key + '\',' + p.id + ',1)" ' + (idx===s.positions.length-1?'disabled':'') + '>&#9654;</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  });

  if(key === 'truck'){
    slotsHTML += '<div class="slot"><div class="hitch"><div class="hitch-bar"></div><div class="hitch-pin"></div></div></div>';
  }

  const toggleBtn = key === 'trailer'
    ? '<button class="toggle-btn ' + (s.enabled ? 'on' : '') + '" onclick="toggleEnabled(\'' + key + '\')">' + (s.enabled ? 'Ενεργή' : 'Ανενεργή') + '</button>'
    : '';

  const posAtMax = s.positions.length >= lim.maxPositions;

  return '<div class="section ' + (s.enabled ? '' : 'disabled') + '">' +
    '<div class="section-head">' +
      '<div class="section-title-row">' +
        '<span class="section-title">' + s.label + '</span>' +
        '<span class="cap-note">έως ' + lim.maxPositions + ' στήλες</span>' +
        toggleBtn +
      '</div>' +
      '<div class="controls">' +
        '<div class="field"><label>Ύψος ντάνες</label><input type="number" min="0" value="' + s.baseHeight + '" onchange="setBaseHeight(\'' + key + '\', this.value)"></div>' +
        '<button class="apply-btn" onclick="applyToAll(\'' + key + '\')">Εφαρμογή ύψους σε όλες</button>' +
      '</div>' +
    '</div>' +
    '<div class="rack">' + slotsHTML + '</div>' +
    '<div class="add-row">' +
      '<button class="add-btn w4" onclick="addPos(\'' + key + '\',4)" ' + (posAtMax?'disabled':'') + '>+ Θέση 4άδα</button>' +
      '<button class="add-btn w3" onclick="addPos(\'' + key + '\',3)" ' + (posAtMax?'disabled':'') + '>+ Θέση 3άδα</button>' +
      '<span class="cap-note">' + s.positions.length + '/' + lim.maxPositions + ' στήλες</span>' +
    '</div>' +
    '<div class="totals">' +
      '<div class="tcard"><div class="tlabel">3άδες σύνολο</div><div class="tval">' + totals.t3 + '</div></div>' +
      '<div class="tcard"><div class="tlabel">4άδες σύνολο</div><div class="tval">' + totals.t4 + '</div></div>' +
      '<div class="tcard total"><div class="tlabel">Σύνολο καρότσας</div><div class="tval">' + totals.total + '</div></div>' +
    '</div>' +
  '</div>';
}

function renderAll(){
  document.getElementById('sections').innerHTML = renderSection('truck') + renderSection('trailer');
  const truckTotal = state.truck.enabled ? computeTotals(state.truck).total : 0;
  const trailerTotal = state.trailer.enabled ? computeTotals(state.trailer).total : 0;
  document.getElementById('grandTotal').textContent = truckTotal + trailerTotal;
  if (stateReady) scheduleSave();
}

function toggleType(key, id){
  const p = state[key].positions.find(p => p.id === id);
  if(p.type === 4){
    p.type = 3;
    p.heights = p.heights.slice(0, 3); // drop only the one stack that no longer fits
  } else {
    p.type = 4;
    p.heights = p.heights.concat([state[key].baseHeight]);
  }
  renderAll();
}
function setStackHeight(key, id, stackIdx, val){
  const p = state[key].positions.find(p => p.id === id);
  p.heights[stackIdx] = Math.max(0, parseInt(val) || 0);
  renderAll();
}
function movePos(key, id, dir){
  const arr = state[key].positions;
  const idx = arr.findIndex(p => p.id === id);
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  renderAll();
}
function removePos(key, id){
  state[key].positions = state[key].positions.filter(p => p.id !== id);
  renderAll();
}
function addPos(key, type){
  const s = state[key];
  if(s.positions.length >= LIMITS[key].maxPositions) return;
  s.positions.push(newPos(type, mkHeights(type, s.baseHeight)));
  renderAll();
}
function setBaseHeight(key, val){
  state[key].baseHeight = Math.max(0, parseInt(val) || 0);
  renderAll();
}
function applyToAll(key){
  const h = state[key].baseHeight;
  state[key].positions.forEach(p => { p.heights = mkHeights(p.type, h); });
  renderAll();
}
function toggleEnabled(key){
  state[key].enabled = !state[key].enabled;
  renderAll();
}

function printPositionBoxHTML(p){
  const cells = p.type === 4
    ? p.heights.map(h => '<div class="pcell c4">' + h + '</div>').join('')
    : '<div class="pcell c3">' + p.heights[0] + '</div>' +
      '<div class="pcell pgap phatch"></div>' +
      '<div class="pcell c3">' + p.heights[1] + '</div>' +
      '<div class="pcell pgap phatch"></div>' +
      '<div class="pcell c3">' + p.heights[2] + '</div>';
  return '<div class="pcol ' + (p.type === 4 ? 'w4' : 'w3') + '">' + cells + '</div>' +
    '<div class="ptype-label">' + p.type + '</div>';
}

function printSectionHTML(key){
  const s = state[key];
  if(!s.enabled) return '';
  const totals = computeTotals(s);
  const count3 = s.positions.filter(p => p.type === 3).length;
  const count4 = s.positions.filter(p => p.type === 4).length;
  const sectionWord = key === 'truck' ? 'φορτηγό' : 'ρυμούλκα';

  let row = '';
  if(key === 'truck'){
    row += '<div class="pslot"><div class="pcab">ΚΑΜΠΙΝΑ</div></div>';
    row += '<div class="pslot"><div class="phatch pbuffer"></div><div class="plabel">κενές</div></div>';
  }
  if(key === 'trailer'){
    row += '<div class="pslot"><div class="phitch"><div class="bar"></div><div class="pin"></div></div></div>';
    row += '<div class="pslot"><div class="phatch pbuffer"></div><div class="plabel">κενές</div></div>';
  }
  s.positions.forEach(p => {
    row += '<div class="pslot">' + printPositionBoxHTML(p) + '</div>';
  });
  if(key === 'truck'){
    row += '<div class="pslot"><div class="phitch"><div class="bar"></div><div class="pin"></div></div></div>';
  }

  return '<div class="psection">' +
    '<div class="sectiontitle">' + s.label + '</div>' +
    '<div class="prow">' + row + '</div>' +
    '<div class="ptotals">' +
      '<div>3άδες: <b>' + count3 + '</b> - κλούβες: <b>' + totals.t3 + '</b></div>' +
      '<div>4άδες: <b>' + count4 + '</b> - κλούβες: <b>' + totals.t4 + '</b></div>' +
      '<div>Σύνολο ' + sectionWord + ': <b>' + totals.total + '</b> κλούβες</div>' +
    '</div>' +
  '</div>';
}

function printLoad(){
  const truckTotal = state.truck.enabled ? computeTotals(state.truck).total : 0;
  const trailerTotal = state.trailer.enabled ? computeTotals(state.trailer).total : 0;
  const grand = truckTotal + trailerTotal;
  const now = new Date();
  const dateStr = now.toLocaleDateString('el-GR');

  const html = '<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><title>Φόρτωση Καρότσας</title>' +
    '<style>' +
    '@page{size:landscape;margin:14mm;}' +
    '*{box-sizing:border-box;}' +
    'body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:0;padding:20px;}' +
    'h1{font-size:22px;margin:0 0 2px;}' +
    '.meta{font-size:12px;color:#555;margin-bottom:18px;}' +
    '.psection{break-inside:avoid;page-break-inside:avoid;}' +
    '.sectiontitle{font-size:17px;font-weight:700;margin:18px 0 8px;border-bottom:2px solid #111;padding-bottom:4px;}' +
    '.prow{display:flex;align-items:flex-start;gap:0;flex-wrap:wrap;margin-bottom:10px;}' +
    '.pslot{display:flex;flex-direction:column;align-items:center;}' +
    '.pcol{height:88px;border:2px solid #333;box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden;}' +
    '.pcol.w4{width:76px;}' +
    '.pcol.w3{width:58px;}' +
    '.pcell{border-bottom:2px solid #333;flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#fff;}' +
    '.pcell:last-child{border-bottom:none;}' +
    '.pcell.c3{flex:3;}' +
    '.pcell.pgap{flex:1;}' +
    '.ptype-label{font-size:11px;font-weight:700;color:#333;margin-top:3px;text-align:center;}' +
    '.pcab{width:64px;height:88px;border:2px solid #333;background:#333;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;text-align:center;}' +
    '.phitch{width:32px;height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}' +
    '.phitch .bar{width:22px;height:5px;background:#333;border-radius:3px;}' +
    '.phitch .pin{width:13px;height:13px;border-radius:50%;background:#333;}' +
    '.phatch{background-color:#fff;background-image:repeating-linear-gradient(45deg,#333 0 1.5px,transparent 1.5px 8px),repeating-linear-gradient(-45deg,#333 0 1.5px,transparent 1.5px 8px);}' +
    '.pbuffer{height:88px;width:34px;border:2px solid #333;box-sizing:border-box;}' +
    '.plabel{font-size:9px;text-transform:uppercase;color:#555;margin-top:2px;text-align:center;}' +
    '.ptotals{display:flex;flex-direction:column;gap:3px;font-size:13px;color:#333;margin-bottom:6px;}' +
    '.ptotals b{font-size:15px;color:#111;}' +
    '.grandline{margin-top:22px;padding-top:14px;border-top:3px solid #111;font-size:22px;font-weight:700;display:flex;justify-content:space-between;break-inside:avoid;page-break-inside:avoid;}' +
    '</style></head><body>' +
    '<h1>ΚΑΜΠΟΣΟΣ — Φόρτωση Καρότσας</h1>' +
    '<div class="meta">Εκτύπωση: ' + dateStr + '</div>' +
    printSectionHTML('truck') +
    printSectionHTML('trailer') +
    '<div class="grandline"><span>Σύνολο φόρτωσης</span><span>' + grand + ' κλούβες</span></div>' +
    '</body></html>';

  const win = window.open('', '_blank');
  if(!win){ alert('Επίτρεψε τα pop-ups για να ανοίξει η εκτύπωση.'); return; }
  win.document.open();
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); }, 250);
}
</script>
</body>
</html>
